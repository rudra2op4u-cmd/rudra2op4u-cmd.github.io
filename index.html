<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            flex-wrap: wrap; /* Allows tabs to wrap on smaller mobile screens */
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--primary);
            background: #eff6ff;
        }

        .tab-btn:hover:not(.active) {
            background: #f1f5f9;
            color: var(--text);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Iframe Styling */
        .web-frame {
            width: 100%;
            height: 650px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
        }

        /* Navigation / Breadcrumbs (Drive Tab) */
        .navigation-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
            min-height: 40px;
        }

        .back-btn {
            background-color: #f1f5f9;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: #e2e8f0;
        }

        .breadcrumb {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* Status & Loader */
        .status-message {
            padding: 24px;
            text-align: center;
            color: var(--text-light);
            font-size: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }

        /* File Tree Table UI */
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            transition: background 0.15s ease;
        }

        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background-color: #f8fafc; }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            flex-grow: 1;
        }

        .file-actions { display: flex; gap: 8px; }

        /* Action Buttons */
        .btn {
            padding: 6px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
        }

        .view-btn { background: #f1f5f9; color: #334155; border: 1px solid var(--border); }
        .view-btn:hover { background: #e2e8f0; }
        
        .dl-btn { background: var(--primary); color: white; border: 1px solid transparent; }
        .dl-btn:hover { background: var(--primary-hover); }

        .icon { font-size: 18px; display: inline-block; width: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Personal Dashboard</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('drive')">📁 Cloud Drive</button>
            <button class="tab-btn" onclick="switchTab('notices')">📌 Notices & Circulars</button>
            <button class="tab-btn" onclick="switchTab('portal')">🎓 Student Portal</button>
        </div>

        <div id="drive-tab" class="tab-content active">
            <div class="navigation-bar">
                <button id="backBtn" class="back-btn" onclick="navigateUp()">← Back</button>
                <div id="breadcrumb" class="breadcrumb">Root Directory</div>
            </div>

            <div id="status" class="status-message">Loading system directory...</div>
            <ul id="files" class="file-list" style="display: none;"></ul>
        </div>

        <div id="notices-tab" class="tab-content">
            <iframe class="web-frame" src="https://www.mbwa.org.in/notices-circular.php" title="MBWA Notices and Circulars"></iframe>
        </div>

        <div id="portal-tab" class="tab-content">
            <iframe class="web-frame" src="https://weblogins.mbwa.org.in/" title="MBWA Web Logins"></iframe>
        </div>
    </div>

    <script>
        // --- Tab Switching Logic ---
        function switchTab(tabId) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Update content views
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
        }

        // --- Drive API Logic ---
        const API_KEY = 'AIzaSyAGQfDiuqM0L0CjoJjWyHj1AJc7tsj9_bk';
        const ROOT_FOLDER_ID = '1BOoFUul-K-slUQJ_KldEgrHhb9x19Axa';

        let folderHistory = [ROOT_FOLDER_ID];
        let currentFolderName = "Root Directory";

        async function fetchDriveFiles(folderId) {
            const statusElement = document.getElementById('status');
            const listElement = document.getElementById('files');
            
            statusElement.style.display = 'block';
            statusElement.innerText = 'Reading directory contents...';
            listElement.style.display = 'none';

            const query = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
            const fields = 'files(id,name,mimeType,webContentLink,webViewLink)';
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=${fields}&key=${API_KEY}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API processing error. Validate permissions constraints.');
                
                const data = await response.json();
                renderFiles(data.files);
            } catch (error) {
                statusElement.innerText = 'Error fetching structure: ' + error.message;
            }
        }

        function renderFiles(files) {
            const listElement = document.getElementById('files');
            const statusElement = document.getElementById('status');
            const backBtn = document.getElementById('backBtn');
            const breadcrumb = document.getElementById('breadcrumb');
            
            backBtn.style.display = folderHistory.length > 1 ? 'inline-flex' : 'none';
            breadcrumb.innerText = currentFolderName;

            if (!files || files.length === 0) {
                statusElement.innerText = 'This folder is currently empty.';
                return;
            }
            
            statusElement.style.display = 'none';
            listElement.innerHTML = '';
            listElement.style.display = 'block';

            files.sort((a, b) => {
                const aIsFolder = a.mimeType === 'application/vnd.google-apps.folder';
                const bIsFolder = b.mimeType === 'application/vnd.google-apps.folder';
                if (aIsFolder && !bIsFolder) return -1;
                if (!aIsFolder && bIsFolder) return 1;
                return a.name.localeCompare(b.name);
            });

            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                
                const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                const icon = isFolder ? '📁' : '📄';

                const infoDiv = document.createElement('div');
                infoDiv.className = 'file-info';
                infoDiv.innerHTML = `<span class="icon">${icon}</span> <span>${file.name}</span>`;
                
                if (isFolder) {
                    infoDiv.onclick = () => navigateInto(file.id, file.name);
                }

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'file-actions';

                let actionButtons = `<a href="${file.webViewLink}" target="_blank" class="btn view-btn">View</a>`;
                if (!isFolder && file.webContentLink) {
                    actionButtons += `<a href="${file.webContentLink}" class="btn dl-btn">Download</a>`;
                }
                actionsDiv.innerHTML = actionButtons;

                li.appendChild(infoDiv);
                li.appendChild(actionsDiv);
                listElement.appendChild(li);
            });
        }

        function navigateInto(folderId, folderName) {
            currentFolderName = folderName;
            folderHistory.push(folderId);
            fetchDriveFiles(folderId);
        }

        function navigateUp() {
            if (folderHistory.length > 1) {
                folderHistory.pop();
                const previousFolderId = folderHistory[folderHistory.length - 1];
                currentFolderName = folderHistory.length === 1 ? "Root Directory" : "Parent Folder";
                fetchDriveFiles(previousFolderId);
            }
        }

        // Initialize Drive fetching automatically
        fetchDriveFiles(ROOT_FOLDER_ID);
    </script>
</body>
</html>
