<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Resource Drive</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .file-list { list-style: none; padding: 0; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .file-item:hover { background-color: #f9f9f9; }
        .btn { padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; margin-left: 8px; display: inline-block; }
        .view-btn { background: #e0e0e0; color: #333; }
        .dl-btn { background: #0070f3; color: white; }
        .folder-icon { color: #f4b400; margin-right: 8px; }
    </style>
</head>
<body>

    <h2>Shared Downloads Directory</h2>
    <div id="status">Loading files...</div>
    <ul id="files" class="file-list"></ul>

    <script>
        // Replace these with your actual configurations
        const API_KEY = 'AIzaSyAGQfDiuqM0L0CjoJjWyHj1AJc7tsj9_bk';
        const FOLDER_ID = '1BOoFUul-K-slUQJ_KldEgrHhb9x19Axa';

        async function fetchDriveFiles() {
            // q parameter filters for: items inside parent folder AND not moved to trash
            const query = encodeURIComponent(`'${FOLDER_ID}' in parents and trashed = false`);
            const fields = 'files(id,name,mimeType,webContentLink,webViewLink)';
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=${fields}&key=${API_KEY}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch file directory.');
                
                const data = await response.json();
                renderFiles(data.files);
            } catch (error) {
                document.getElementById('status').innerText = 'Error loading files: ' + error.message;
            }
        }

        function renderFiles(files) {
            const listElement = document.getElementById('files');
            const statusElement = document.getElementById('status');
            
            if (files.length === 0) {
                statusElement.innerText = 'No files found in this directory.';
                return;
            }
            
            statusElement.style.display = 'none';
            listElement.innerHTML = ''; // Clear fallback text

            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                
                // Determine if item is a subfolder or file
                const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                const displayName = isFolder ? `ūüďĀ ${file.name}` : `ūüďĄ ${file.name}`;

                let actionButtons = `<a href="${file.webViewLink}" target="_blank" class="btn view-btn">View</a>`;
                
                // Native binaries/images/PDFs can be downloaded directly; native Google Docs/Sheets cannot 
                if (!isFolder && file.webContentLink) {
                    actionButtons += `<a href="${file.webContentLink}" class="btn dl-btn">Download</a>`;
                }

                li.innerHTML = `<span>${displayName}</span> <div>${actionButtons}</div>`;
                listElement.appendChild(li);
            });
        }

        // Initialize on page load
        fetchDriveFiles();
    </script>
</body>
</html>
